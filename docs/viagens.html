<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mystro Viagens Results</title>
  <style>
    :root {
      --bg: #f4efe7;
      --card: #fffaf3;
      --ink: #18212b;
      --muted: #5f6b76;
      --accent: #116466;
      --accent-2: #d97d54;
      --line: #dfd2c3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top, #fffdf8, var(--bg));
      color: var(--ink);
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 20px 60px; }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(24, 33, 43, 0.08);
    }
    .hero { padding: 28px; }
    .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:20px; }
    .btn {
      display:inline-block; padding:14px 18px; border-radius:14px; text-decoration:none;
      font-weight:700; border:1px solid transparent;
    }
    .btn-primary { background: var(--accent); color:white; }
    .btn-secondary { background:white; color:var(--ink); border-color:var(--line); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap:16px; margin-top:20px; }
    .card { padding:20px; }
    h1 { margin:0 0 12px; font-size:42px; }
    h2 { margin-top:0; font-size:20px; }
    p, li { color:var(--muted); line-height:1.5; }
    .value { font-size:28px; font-weight:700; color:var(--ink); }
    .label { margin-top:4px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .table { width:100%; border-collapse: collapse; margin-top:12px; }
    .table th, .table td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); font-size:14px; }
    .table th { color: var(--accent-2); }
    code { background:#f1e8dd; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Mystro Viagens</h1>
      <p>Painel publico de resultados das viagens analisadas no PC, com foco em horas, dias, zonas e filtros práticos para Bolt e Uber.</p>
      <div class="actions">
        <a class="btn btn-primary" href="./index.html">Voltar ao site</a>
        <a class="btn btn-secondary" href="./data/mystro-viagens-results.json">Ver JSON dos resultados</a>
      </div>
      <div class="grid" id="top-grid"></div>
    </section>

    <section class="grid" style="margin-top:20px;">
      <article class="card">
        <h2>Melhores Dias por Hora</h2>
        <table class="table" id="best-days"></table>
      </article>
      <article class="card">
        <h2>Melhores Horas por Hora</h2>
        <table class="table" id="best-hours"></table>
      </article>
    </section>

    <section class="grid" style="margin-top:20px;">
      <article class="card">
        <h2>Filtros Bolt</h2>
        <table class="table" id="filters-bolt"></table>
      </article>
      <article class="card">
        <h2>Filtros Uber</h2>
        <table class="table" id="filters-uber"></table>
      </article>
    </section>

    <section class="grid" style="margin-top:20px;">
      <article class="card">
        <h2>Zonas Fortes Bolt</h2>
        <table class="table" id="zones-bolt"></table>
      </article>
      <article class="card">
        <h2>Zonas Fortes Uber</h2>
        <table class="table" id="zones-uber"></table>
      </article>
    </section>
  </div>

  <script>
    function currency(v) { return v == null ? '-' : v.toFixed(2) + ' EUR'; }
    function metric(v, unit) { return v == null ? '-' : v + ' ' + unit; }
    function table(el, headers, rows) {
      el.innerHTML = '<thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead>' +
        '<tbody>' + rows.map(r => '<tr>' + r.map(c => '<td>' + c + '</td>').join('') + '</tr>').join('') + '</tbody>';
    }

    fetch('./data/mystro-viagens-results.json')
      .then(r => r.json())
      .then(data => {
        const top = document.getElementById('top-grid');
        const archive = data.archive || {};
        const platform = data.profit.platform_summary || [];
        top.innerHTML = [
          ['Capturas', archive.totalImages],
          ['Apps detectadas', archive.appCount],
          ['Linhas limpas', data.profit.rows_used_after_cleaning],
          ['Periodo', (data.profit.date_range?.first || '-') + ' ate ' + (data.profit.date_range?.last || '-')],
          ['Bolt medio', (platform.find(x => x.platform === 'bolt')?.avg_eur_per_hour || '-') + ' EUR/h'],
          ['Uber medio', (platform.find(x => x.platform === 'uber')?.avg_eur_per_hour || '-') + ' EUR/h'],
        ].map(item => `<div class="card"><div class="value">${item[1]}</div><div class="label">${item[0]}</div></div>`).join('');

        table(
          document.getElementById('best-days'),
          ['Plataforma', 'Dia', 'Viagens', 'EUR/h', 'EUR/km'],
          (data.profit.best_weekdays_by_eur_per_hour || []).map(r => [r.platform, r.weekday, r.trip_count, r.avg_eur_per_hour, r.avg_eur_per_km])
        );
        table(
          document.getElementById('best-hours'),
          ['Plataforma', 'Hora', 'Viagens', 'EUR/h', 'EUR/km'],
          (data.profit.best_hours_by_eur_per_hour || []).map(r => [r.platform, r.hour + ':00', r.trip_count, r.avg_eur_per_hour, r.avg_eur_per_km])
        );

        const fb = data.filters.bolt || {};
        const fu = data.filters.uber || {};
        table(document.getElementById('filters-bolt'),
          ['Faixa', 'Min EUR/h', 'Min EUR/km', 'Pickup max'],
          Object.entries(fb).map(([k,v]) => [k, v.recommended_min_eur_per_hour, v.recommended_min_eur_per_km, v.recommended_max_pickup_km + ' km'])
        );
        table(document.getElementById('filters-uber'),
          ['Faixa', 'Min EUR/h', 'Min EUR/km', 'Pickup max'],
          Object.entries(fu).map(([k,v]) => [k, v.recommended_min_eur_per_hour, v.recommended_min_eur_per_km, v.recommended_max_pickup_km + ' km'])
        );

        table(document.getElementById('zones-bolt'),
          ['Zona', 'Faixa', 'Viagens', 'EUR/h', 'EUR/km'],
          (data.zones.bolt || []).map(r => [r.pickup_zone, r.time_bucket, r.trip_count, r.avg_eur_per_hour, r.avg_eur_per_km])
        );
        table(document.getElementById('zones-uber'),
          ['Zona', 'Faixa', 'Viagens', 'EUR/h', 'EUR/km'],
          (data.zones.uber || []).map(r => [r.pickup_zone, r.time_bucket, r.trip_count, r.avg_eur_per_hour, r.avg_eur_per_km])
        );
      });
  </script>
</body>
</html>
